services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: stylistics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stylistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stylistics_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stylistics_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stylistics} -d ${POSTGRES_DB:-stylistics_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
