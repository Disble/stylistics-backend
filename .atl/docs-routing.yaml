# Canonical project-local docs routing for KIN.
# Keep entries small and actionable. Only add sources the project actually wants.

version: 1

defaults:
  prefer:
    - official-skill
    - official-mcp
    - llms-txt
    - context7
    - official-docs
    - github

project_instructions:
  canonical: .atl/docs-routing.yaml
  pointer_block: |
    ## KIN Docs Routing

    KIN project-local docs routing lives in `.atl/docs-routing.yaml`.
    Read that file first when resolving external-library docs.
    Then use `.atl/skill-registry.md`, project instruction files, and relevant skills only to discover or follow sources that routing and the current project context point to; they do not replace local routing.

libraries:
  mastra:
    aliases:
      - "@mastra/core"
      - "@mastra/evals"
      - "@mastra/libsql"
      - "@mastra/loggers"
      - "@mastra/memory"
      - "@mastra/observability"
      - "@mastra/pg"
    prefer:
      - official-skill
      - official-mcp
      - llms-txt
      - official-docs
      - github
    skills:
      - .agents/skills/mastra/SKILL.md
    mcp:
      provider: official
      notes: Prefer official Mastra MCP/tool-use guidance when the manifest or docs expose it.
    llms:
      docs_domain: mastra.ai
      manifest_url: https://mastra.ai/llms.txt
    official_docs:
      - https://mastra.ai/docs
      - https://mastra.ai/reference
      - https://mastra.ai/docs/build-with-ai/mcp-docs-server
      - https://mastra.ai/.well-known/skills/index.json
    notes:
      - Load the local Mastra skill first for project-specific guidance, then confirm current APIs via embedded docs or Mastra's llms.txt/docs.
      - This project depends on Mastra packages locally, so prefer version-matched embedded docs before remote references when API signatures matter.
