pre-commit:
  commands:
    lint:
      glob: "*.{ts,mts,cts,js,mjs,cjs}"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,mts,cts,js,mjs,cjs,json,md,yml,yaml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck
